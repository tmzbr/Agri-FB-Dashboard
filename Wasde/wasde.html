<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WASDE Supply &amp; Demand Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root{
  --or:#FF5500;--bk:#333333;--gy:#888888;
  --bg:#F4F4F4;--bd:#E5E5E5;--wh:#FFFFFF;
  --gr:#27AE60;--rd:#C0392B;
  --font:'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--bk);font-size:12px;}

.hdr{background:var(--wh);border-bottom:3px solid var(--or);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr-title{font-size:14px;font-weight:700;color:var(--or);}
.hdr-sub{font-size:10px;color:var(--gy);margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.hdr-updated{font-size:10px;color:var(--gy);}
.cmdty-select{border:1px solid var(--bd);border-radius:4px;padding:7px 12px;font-size:12px;font-weight:700;font-family:var(--font);color:var(--or);background:var(--wh);cursor:pointer;}

.content{padding:16px 24px;display:flex;flex-direction:column;gap:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.card{background:var(--wh);border:1px solid var(--bd);border-radius:6px;padding:16px;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--or);flex-wrap:wrap;gap:8px;}
.card-title{font-size:12px;font-weight:700;color:var(--bk);}
.card-stat{font-size:10px;color:var(--gy);}
canvas{max-height:220px;}

.yr-select{border:1px solid var(--bd);border-radius:4px;padding:4px 8px;font-size:11px;font-family:var(--font);color:var(--bk);background:var(--wh);}
.toggle-group{display:flex;border:1px solid var(--bd);border-radius:4px;overflow:hidden;}
.tog-btn{padding:4px 11px;font-size:10.5px;font-weight:600;cursor:pointer;background:var(--wh);color:var(--gy);border:none;font-family:var(--font);transition:all .15s;}
.tog-btn.active{background:var(--or);color:var(--wh);}
.hdr-ctrl-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-filter-btn{gap:8px;}
.hdr-filter-tag{font-size:9px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.3px;padding-right:8px;border-right:1px solid var(--bd);}
.hdr-region-btn{border-color:var(--or);gap:8px;}
.hdr-region-tag{font-size:9px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.3px;padding-right:8px;border-right:1px solid var(--bd);}
.hdr-filter-item{display:flex;align-items:center;gap:8px;border:1px solid var(--bd);border-radius:4px;padding:6px 10px;background:var(--wh);}
.card-filter{display:inline-flex;align-items:center;gap:5px;}
.card-filter-tag{font-size:8.5px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.ddown-btn-sm{padding:3px 7px;font-size:10px;gap:5px;}
.yr-select-sm{padding:3px 6px;font-size:10px;}

.info-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--gy);color:#fff;font-size:9px;font-weight:700;font-style:italic;font-family:Georgia,'Times New Roman',serif;cursor:default;position:relative;flex-shrink:0;}
.info-badge .info-tooltip{display:none;position:absolute;top:130%;right:0;background:var(--bk);color:#fff;font-size:10.5px;font-weight:400;font-style:normal;font-family:var(--font);padding:8px 10px;border-radius:5px;width:190px;line-height:1.4;z-index:30;text-transform:none;letter-spacing:normal;box-shadow:0 3px 12px rgba(0,0,0,.15);}
.info-badge:hover .info-tooltip, .info-badge:focus .info-tooltip{display:block;}

.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{padding:5px 11px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;font-size:10.5px;font-weight:600;color:var(--gy);background:var(--wh);user-select:none;display:flex;align-items:center;gap:5px;transition:all .12s;}
.chip.active{background:var(--or);color:var(--wh);border-color:var(--or);}
.chip-swatch{width:8px;height:8px;border-radius:2px;background:currentColor;opacity:.7;}

.cp-label{font-size:9.5px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;}
.check-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bd);}
.check-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--bk);cursor:pointer;user-select:none;}
.check-item input{accent-color:var(--or);cursor:pointer;width:13px;height:13px;}
.check-swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.ddown{position:relative;display:inline-block;}
.ddown-btn{border:1px solid var(--bd);border-radius:4px;padding:6px 10px;font-size:11px;font-family:var(--font);background:var(--wh);color:var(--bk);cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.ddown-btn:hover{border-color:var(--gy);}
.ddown-arrow{font-size:8px;color:var(--gy);}
.ddown-panel{position:absolute;top:100%;right:0;margin-top:4px;background:var(--wh);border:1px solid var(--bd);border-radius:5px;box-shadow:0 3px 12px rgba(0,0,0,.1);padding:7px;z-index:20;min-width:170px;max-height:260px;overflow-y:auto;}
.ddown-panel.hidden{display:none;}
.ddown-item{display:flex;align-items:center;gap:8px;padding:6px 6px;font-size:11.5px;color:var(--bk);cursor:pointer;border-radius:3px;white-space:nowrap;}
.ddown-item:hover{background:#FFF5EC;}
.ddown-item input{accent-color:var(--or);cursor:pointer;width:13px;height:13px;flex-shrink:0;}
.ddown-item.radio-item{}
.ddown-swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.tbl-wrap{overflow-x:auto;}
table{border-collapse:collapse;font-size:11px;width:100%;}
thead th{padding:6px 9px;text-align:right;color:var(--gy);font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.3px;border-bottom:2px solid var(--or);white-space:nowrap;position:sticky;top:0;background:var(--wh);}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:var(--wh);}
tbody tr{border-bottom:1px solid var(--bd);}
tbody tr:hover td{background:#FFF5EC;}
tbody td{padding:6px 9px;text-align:right;white-space:nowrap;}
tbody td:first-child{text-align:left;font-weight:600;position:sticky;left:0;background:var(--wh);}
tbody tr:hover td:first-child{background:#FFF5EC;}
tr.grp td{font-weight:700;color:var(--or);background:#FFFAF5;}
tr.grp td:first-child{background:#FFFAF5;padding-top:9px;}
tr.subgrp td:first-child{padding-left:10px;font-weight:700;color:var(--bk);padding-top:6px;}
tr.sub td:first-child{padding-left:24px;font-weight:400;color:var(--bk);}
tr.metric td{font-weight:700;}
tr.stu-row td{font-weight:700;color:var(--or);}
tr.metric td:first-child{background:var(--wh);}

.src{font-size:9px;color:#BBB;margin-top:10px;}
.loading{text-align:center;padding:60px 24px;color:var(--gy);}
.spinner{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#FFF8F8;border:1px solid #FFCCCC;border-radius:6px;padding:16px;color:var(--rd);margin:24px;font-size:12px;line-height:1.8;}

@media(max-width:768px){
  .row2{grid-template-columns:1fr;gap:12px;}
  .content{padding:12px;gap:12px;}
  .card{padding:12px;}
  .hdr{padding:11px 12px;flex-direction:column;align-items:flex-start;}
  table{min-width:560px;}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">WASDE Supply &amp; Demand Tracker</div>
    <div class="hdr-sub">Monthly forecast revisions — USDA WASDE, as reported at time of release</div>
  </div>
  <div class="hdr-right">
    <span class="hdr-updated" id="last-upd">—</span>
    <select class="cmdty-select" id="commoditySelect"></select>
    <div class="ddown" id="ddYearsRange">
      <button class="ddown-btn hdr-filter-btn" type="button"><span class="hdr-filter-tag">Period</span><span id="ddYearsRangeLabel">5 years</span><span class="ddown-arrow">▾</span></button>
      <div class="ddown-panel hidden" id="ddYearsRangePanel"></div>
    </div>
    <div class="ddown" id="ddStuCountry">
      <button class="ddown-btn hdr-filter-btn" type="button"><span class="hdr-filter-tag">Region</span><span id="ddStuCountryLabel">World</span><span class="ddown-arrow">▾</span></button>
      <div class="ddown-panel hidden" id="ddStuCountryPanel"></div>
    </div>
    <div class="hdr-filter-item">
      <span class="hdr-filter-tag">Harvest Year</span>
      <select class="yr-select" id="chartYearSelect"></select>
      <span class="info-badge" tabindex="0">i<span class="info-tooltip">Only affects the Monthly Revision History charts on the right.</span></span>
    </div>
  </div>
</div>

<div id="root"><div class="loading"><div class="spinner"></div>Loading wasde.db…</div></div>

<script>
// ══ CONFIG ═══════════════════════════════════════════════════════════════════
const COMMODITIES = [
  {key:'Oilseed, Soybean', label:'Soybean'},
  {key:'Corn', label:'Corn'},
  {key:'Cotton', label:'Cotton'},
];
const CMDTY_CONFIG = {
  'Corn':               {supply:['Beginning Stocks','Production','Imports'], demand:['Domestic Total','Exports'], directTotals:false},
  'Oilseed, Soybean':   {supply:['Beginning Stocks','Production','Imports'], demand:['Domestic Total','Exports'], directTotals:false},
  'Cotton':             {supply:['Beginning Stocks','Production','Imports'], demand:['Domestic Use','Exports'],   directTotals:false},
};
const REGION_ORDER = ['World','United States','Brazil','Argentina','China','India','Pakistan','European Union','Others'];
const OTHER_COUNTRIES = ['United States','Brazil','Argentina','China','India','Pakistan','European Union'];
const REGION_COLORS = {
  'World':'#333333','United States':'#FF5500','Brazil':'#27AE60','Argentina':'#7EA8D8',
  'China':'#C0392B','India':'#9B7FC7','Pakistan':'#C9A227','European Union':'#5F9EA0','Others':'#B0B0B0',
};
const MEASURE_LABELS = {supply:'Supply', demand:'Demand', ending_stocks:'Ending Stocks', stock_to_use:'Stock-to-Use (%)', production:'Production', area:'Area Harvested', yield:'Yield'};

// componentes de Area/Yield -- unidade fixada na versao metrica (do WAP), que
// existe pra World + todos os paises rastreados, inclusive United States.
// A versao "nativa" do WASDE (Acres/Bushels/Pounds) so existe pra US, entao
// nao da pra usar ela aqui sem quebrar a comparacao entre paises.
const AREA_YIELD_CONFIG = {
  'Corn':               {production:['Production'], area:['Area Harvested'], yield:['Yield per Harvested Acre'], areaUnit:'Million Hectares', yieldUnit:'Metric Tons per Hectare', nativeAreaUnit:'Million Acres', nativeYieldUnit:'Bushels'},
  'Oilseed, Soybean':   {production:['Production'], area:['Area Harvested'], yield:['Yield per Harvested Acre'], areaUnit:'Million Hectares', yieldUnit:'Metric Tons per Hectare', nativeAreaUnit:'Million Acres', nativeYieldUnit:'Bushels'},
  'Cotton':             {production:['Production'], area:['Area Harvested'], yield:['Yield per Harvested Acre'], areaUnit:'Million Hectares', yieldUnit:'Kilograms per Hectare', nativeAreaUnit:'Million Acres', nativeYieldUnit:'Pounds'},
};

// ══ STATE ════════════════════════════════════════════════════════════════════
let db;
let commodity = COMMODITIES[0].key;
let tableCountries = new Set(['World','Brazil','United States','China']);
let tableMode = 'simplified';
let chartYear = null;
let chartMeasure = 'stock_to_use';
let ayMeasure = 'area';
let tradeMeasure = 'exports';
let chartRevision, chartSTU, chartAY, chartAYRevision, chartEI, chartTradeRevision, chartPrice, chartPriceRevision, chartBridge;

function q(sql, params=[]){
  const stmt = db.prepare(sql);
  stmt.bind(params);
  const out = [];
  while(stmt.step()) out.push(stmt.getAsObject());
  stmt.free();
  return out;
}

// ══ DATA HELPERS ═════════════════════════════════════════════════════════════
function measureSeries(cmdty, region, myYear, attrs, unit){
  if(!attrs.length) return [];
  const ph = attrs.map(()=>'?').join(',');
  const unitClause = unit ? `AND unit=?` : '';
  const params = unit ? [cmdty, region, myYear, ...attrs, unit] : [cmdty, region, myYear, ...attrs];
  return q(`
    SELECT wasde_number, report_title, SUM(value) as value
    FROM wasde_facts
    WHERE commodity=? AND region=? AND market_year=? AND attribute IN (${ph}) ${unitClause}
    GROUP BY wasde_number, report_title
    ORDER BY wasde_number
  `, params);
}
function stockToUseSeries(cmdty, region, myYear){
  const cfg = CMDTY_CONFIG[cmdty];
  const domesticAttr = cfg.demand[0];
  const rawSeries = (attrs) => region==='Others' ? othersSeriesRaw(cmdty, myYear, attrs) : measureSeries(cmdty, region, myYear, attrs);

  const esS = rawSeries(['Ending Stocks']);
  const domS = rawSeries([domesticAttr]);
  const domMap = {}; domS.forEach(r=>domMap[r.wasde_number]=r.value);

  let demandMap = domMap;
  if(tableMode !== 'simplified'){
    const expS = rawSeries(['Exports']);
    const expMap = {}; expS.forEach(r=>expMap[r.wasde_number]=r.value);
    demandMap = {};
    domS.forEach(r => {
      const e = expMap[r.wasde_number];
      demandMap[r.wasde_number] = (r.value!=null && e!=null) ? r.value+e : null;
    });
  }

  return esS.map(r => ({wasde_number:r.wasde_number, report_title:r.report_title,
    value:(r.value!=null && demandMap[r.wasde_number]) ? (r.value/demandMap[r.wasde_number])*100 : null}));
}
// Stock-to-Use "oficial" do dashboard: SEMPRE World + formula Simplified
// (Ending Stocks / Domestic Use, sem Exports), independente de region/tableMode.
// Usada em todo lugar que exibe Stock-to-Use -- por isso o numero nunca muda
// ao trocar o filtro de Regiao.
function worldStockToUseSeries(cmdty, myYear){
  const cfg = CMDTY_CONFIG[cmdty];
  const domesticAttr = cfg.demand[0];
  const esS = measureSeries(cmdty, 'World', myYear, ['Ending Stocks']);
  const domS = measureSeries(cmdty, 'World', myYear, [domesticAttr]);
  const domMap = {}; domS.forEach(r=>domMap[r.wasde_number]=r.value);
  return esS.map(r => ({wasde_number:r.wasde_number, report_title:r.report_title,
    value:(r.value!=null && domMap[r.wasde_number]) ? (r.value/domMap[r.wasde_number])*100 : null}));
}
function attrsForMeasure(cmdty, meas){
  const cfg = CMDTY_CONFIG[cmdty];
  if(meas === 'supply') return cfg.supply;
  if(meas === 'demand') return cfg.demand;
  if(meas === 'ending_stocks') return ['Ending Stocks'];
  if(meas === 'stock_to_use' && cfg.directTotals) return cfg.stockToUseAttr;
  return null;
}
function seriesForRegion(cmdty, region, myYear, meas){
  const cfg = CMDTY_CONFIG[cmdty];
  if(meas === 'stock_to_use' && !cfg.directTotals){
    return worldStockToUseSeries(cmdty, myYear); // trava em World+Simplified sempre
  }
  return measureSeries(cmdty, region, myYear, attrsForMeasure(cmdty, meas));
}
function othersSeries(cmdty, myYear, meas){
  const world = seriesForRegion(cmdty, 'World', myYear, meas);
  const countrySeries = OTHER_COUNTRIES.map(c => seriesForRegion(cmdty, c, myYear, meas));
  return world.map(w => {
    let sum = 0;
    countrySeries.forEach(cs => { const m = cs.find(r=>r.wasde_number===w.wasde_number); if(m && m.value!=null) sum += m.value; });
    return {wasde_number:w.wasde_number, report_title:w.report_title, value: w.value - sum};
  });
}
function getSeries(cmdty, region, myYear, meas){
  return region==='Others' ? othersSeries(cmdty, myYear, meas) : seriesForRegion(cmdty, region, myYear, meas);
}
function getUnit(cmdty, attrs){
  if(!attrs || !attrs.length) return '%';
  const r = q(`SELECT unit FROM wasde_facts WHERE commodity=? AND attribute=? AND unit!='' LIMIT 1`, [cmdty, attrs[0]]);
  return r.length ? r[0].unit : '';
}
// safra mais recente cujo ultimo status (proj_est_flag) esta vazio == "realizado"
function findClosedYear(cmdty){
  const region = 'World';
  const years = q(`SELECT DISTINCT market_year FROM wasde_facts WHERE commodity=? AND region=? ORDER BY market_year DESC`, [cmdty, region]).map(r=>r.market_year);
  for(const yr of years){
    const maxwn = q(`SELECT MAX(wasde_number) as wn FROM wasde_facts WHERE commodity=? AND region=? AND market_year=?`, [cmdty, region, yr])[0]?.wn;
    const flag = q(`SELECT proj_est_flag FROM wasde_facts WHERE commodity=? AND region=? AND market_year=? AND wasde_number=? AND attribute='Production'`, [cmdty, region, yr, maxwn]);
    if(flag.length && flag[0].proj_est_flag === '') return yr;
  }
  return years[0];
}
// true se, no ultimo relatorio daquela safra, o Avg. Farm Price ainda estava marcado como projecao (nao "realizado")
function isProjectedYear(cmdty, region, yr){
  const maxwn = q(`SELECT MAX(wasde_number) as wn FROM wasde_facts WHERE commodity=? AND region=? AND market_year=? AND attribute='Avg. Farm Price'`, [cmdty, region, yr])[0]?.wn;
  if(!maxwn) return false;
  const flag = q(`SELECT proj_est_flag FROM wasde_facts WHERE commodity=? AND region=? AND market_year=? AND wasde_number=? AND attribute='Avg. Farm Price'`, [cmdty, region, yr, maxwn]);
  return flag.length ? flag[0].proj_est_flag !== '' : false;
}
function yearLabelWithEst(cmdty, region, yr){
  return isProjectedYear(cmdty, region, yr) ? `${yr}e` : yr;
}

// ══ LAYOUT ═══════════════════════════════════════════════════════════════════
function buildLayout(){
  document.getElementById('root').innerHTML = `
  <div class="content">
    <div class="card">
      <div class="card-hdr">
        <span class="card-title" id="tblTitle">Supply &amp; Demand Summary</span>
        <span class="card-stat" id="tblUnit" style="margin-right:auto;margin-left:10px;"></span>
        <div class="hdr-ctrl-group">
          <div class="toggle-group" id="tblModeToggle">
            <button class="tog-btn" data-mode="complete">Complete</button>
            <button class="tog-btn active" data-mode="simplified">Simplified</button>
          </div>
          <div class="ddown" id="ddTblCountries">
            <button class="ddown-btn" type="button"><span id="ddTblCountriesLabel">Countries</span><span class="ddown-arrow">▾</span></button>
            <div class="ddown-panel hidden" id="ddTblCountriesPanel"></div>
          </div>
        </div>
      </div>
      <div class="tbl-wrap"><table><thead><tr id="tblHeadRow"></tr></thead><tbody id="tblBody"></tbody></table></div>
      <div class="src">Source: USDA WASDE. Supply = Beginning Stocks + Production + Imports. Demand = Domestic Use + Exports. "Others" = World minus tracked countries.</div>
    </div>


    <div class="row2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Stock-to-Use — Historical Trend</span>
          <div class="card-filter">
            <span class="card-filter-tag">Region</span>
            <div class="ddown" id="ddRegionSTU">
              <button class="ddown-btn ddown-btn-sm" type="button"><span id="ddRegionSTULabel">World</span><span class="ddown-arrow">▾</span></button>
              <div class="ddown-panel hidden" id="ddRegionSTUPanel"></div>
            </div>
          </div>
        </div>
        <canvas id="chartSTU"></canvas>
        <div class="src">The Stock-to-Use line is always World, Simplified — it does not follow the Region filter (only the Surplus/Deficit bars do).</div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Monthly Revision History</span>
          <div class="hdr-ctrl-group">
            <div class="card-filter">
              <span class="card-filter-tag">Region</span>
              <div class="ddown" id="ddRegionRev">
                <button class="ddown-btn ddown-btn-sm" type="button"><span id="ddRegionRevLabel">World</span><span class="ddown-arrow">▾</span></button>
                <div class="ddown-panel hidden" id="ddRegionRevPanel"></div>
              </div>
            </div>
            <div class="card-filter">
              <span class="card-filter-tag">Harvest Yr</span>
              <select class="yr-select yr-select-sm" id="yrSelectRev"></select>
            </div>
            <div class="ddown" id="ddChartMeasure">
              <button class="ddown-btn" type="button"><span id="ddChartMeasureLabel">S:U</span><span class="ddown-arrow">▾</span></button>
              <div class="ddown-panel hidden" id="ddChartMeasurePanel"></div>
            </div>
          </div>
        </div>
        <canvas id="chartRevision"></canvas>
        <div class="src" id="revNote"></div>
      </div>
    </div>

    <div class="row2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Avg. Farm Price (US) vs. Global Stock-to-Use</span>
          <span class="card-stat">United States only</span>
          <span class="info-badge" tabindex="0">i<span class="info-tooltip">Price and Stock-to-Use figures are sourced directly from USDA WASDE.</span></span>
        </div>
        <canvas id="chartPrice"></canvas>
        <div class="src" id="priceNote"></div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Monthly Revision History — Avg. Farm Price</span>
          <span class="card-stat">United States only</span>
          <span class="info-badge" tabindex="0">i<span class="info-tooltip">From USDA. Sourced directly from USDA WASDE.</span></span>
          <div class="card-filter">
            <span class="card-filter-tag">Harvest Yr</span>
            <select class="yr-select yr-select-sm" id="yrSelectPriceRev"></select>
          </div>
        </div>
        <canvas id="chartPriceRevision"></canvas>
        <div class="src" id="priceRevNote"></div>
      </div>
    </div>

    <div class="row2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Exports / Imports / Net Trade</span>
          <div class="card-filter">

function toggleDdown(panelId){
  const panel = document.getElementById(panelId);

  if(wasHidden) panel.classList.remove('hidden');

// ── dropdown multi-select generico (checkbox) ──
function buildMultiDropdown(btnId, panelId, labelId, labelPrefix, options, selectedSet, onChange){
  document.getElementById(btnId).querySelector('.ddown-btn').onclick = (e) => { e.stopPropagation(); toggleDdown(panelId); };
  const panel = document.getElementById(panelId);
  panel.innerHTML = options.map(r => `
    <label class="ddown-item">
      <input type="checkbox" data-val="${r}" ${selectedSet.has(r)?'checked':''}>
      <span class="ddown-swatch" style="background:${REGION_COLORS[r]||'#999'}"></span>${r}
    </label>`).join('');
  panel.querySelectorAll('input').forEach(inp=>{
    inp.onchange = () => {
      const v = inp.dataset.val;
      if(inp.checked) selectedSet.add(v); else selectedSet.delete(v);
      updateDdownLabel(labelId, labelPrefix, selectedSet.size);
      onChange();
    };
  });
  updateDdownLabel(labelId, labelPrefix, selectedSet.size);
}
function updateDdownLabel(labelId, prefix, count){
  document.getElementById(labelId).textContent = `${prefix} (${count})`;
}

// ── dropdown single-select generico (radio-like, fecha ao escolher) ──
function buildSingleDropdown(btnId, panelId, labelId, options, currentKey, onChange){
  document.getElementById(btnId).querySelector('.ddown-btn').onclick = (e) => { e.stopPropagation(); toggleDdown(panelId); };
  const panel = document.getElementById(panelId);
  panel.innerHTML = options.map(o => `
    <div class="ddown-item radio-item" data-key="${o.key}">${o.label}</div>`).join('');
  panel.querySelectorAll('.ddown-item').forEach(item=>{
    item.onclick = () => {
      document.getElementById(labelId).textContent = options.find(o=>o.key===item.dataset.key).label;
      panel.classList.add('hidden');
      onChange(item.dataset.key);
    };
  });
  document.getElementById(labelId).textContent = options.find(o=>o.key===currentKey)?.label || options[0].label;
}

// World + top3 produtores + top3 consumidores (uniao), recalculado a cada troca de commodity
function computeDefaultCountries(cmdty){
  const lastYr = q(`SELECT DISTINCT market_year FROM wasde_facts WHERE commodity=? AND region='World' ORDER BY market_year DESC LIMIT 1`, [cmdty])[0]?.market_year;
  if(!lastYr) return new Set(['World']);
  const cfgc = CMDTY_CONFIG[cmdty];
  const domesticAttr = cfgc.demand[0];
  function top3(attrs){
    const scored = OTHER_COUNTRIES.map(r => ({r, v: latestRaw(cmdty, r, lastYr, attrs) ?? -Infinity}));
    scored.sort((a,b)=>b.v-a.v);
    return scored.slice(0,3).map(s=>s.r);
  }
  return new Set(['World', ...top3(['Production']), ...top3([domesticAttr])]);
}

function latestRaw(cmdty, region, yr, attrs, unit){
  const s = measureSeries(cmdty, region, yr, attrs, unit).filter(r=>r.value!=null);
  return s.length ? s[s.length-1].value : null;
}
function othersRawLatest(cmdty, yr, attrs, unit){
  const world = latestRaw(cmdty, 'World', yr, attrs, unit);
  if(world==null) return null;
  let sum = 0;
  OTHER_COUNTRIES.forEach(c => { const v = latestRaw(cmdty, c, yr, attrs, unit); if(v!=null) sum += v; });
  return world - sum;
}
function othersSeriesRaw(cmdty, yr, attrs){
  const world = measureSeries(cmdty, 'World', yr, attrs);
  const countrySeries = OTHER_COUNTRIES.map(c => measureSeries(cmdty, c, yr, attrs));
  return world.map(w => {
    let sum = 0;
    countrySeries.forEach(cs => { const m = cs.find(r=>r.wasde_number===w.wasde_number); if(m && m.value!=null) sum += m.value; });
    return {wasde_number:w.wasde_number, report_title:w.report_title, value: w.value - sum};
  });
}
function tradeMonthlySeries(cmdty, region, yr, measure){
  const rawSeries = (attrs) => region==='Others' ? othersSeriesRaw(cmdty, yr, attrs) : measureSeries(cmdty, region, yr, attrs);
  if(measure === 'exports') return rawSeries(['Exports']);
  if(measure === 'imports') return rawSeries(['Imports']);
  const exp = rawSeries(['Exports']);
  const imp = rawSeries(['Imports']);
  const impMap = {}; imp.forEach(r=>impMap[r.wasde_number]=r.value);
  return exp.map(r => ({wasde_number:r.wasde_number, report_title:r.report_title,
    value:(r.value!=null && impMap[r.wasde_number]!=null) ? r.value-impMap[r.wasde_number] : null}));
}

// ══ TABLE (year-over-year, latest reading per market year) ═════════════════════
function latestValue(cmdty, region, myYear, meas){
  const s = getSeries(cmdty, region, myYear, meas).filter(r=>r.value!=null);
  return s.length ? s[s.length-1].value : null;
}

function latestValueRaw(cmdty, region, yr, attrs){
  return region==='Others' ? othersRawLatest(cmdty, yr, attrs) : latestRaw(cmdty, region, yr, attrs);
}

function renderTable(){
  const cfg = CMDTY_CONFIG[commodity];
  document.getElementById('tblTitle').textContent = `Supply & Demand Summary — ${COMMODITIES.find(c=>c.key===commodity).label}`;
  document.getElementById('tblUnit').textContent = `${getUnit(commodity, ['Production'])} (Stock-to-Use in %)`;

  const worldRegion = 'World';
  const selectedRegions = REGION_ORDER.filter(r => tableCountries.has(r));
  const domesticAttr = cfg.directTotals ? cfg.demand[0] : cfg.demand[0]; // 'Domestic Total'/'Domestic Use'/'Total Use'

  let years = q(`SELECT DISTINCT market_year FROM wasde_facts WHERE commodity=? AND region=? ORDER BY market_year ASC`, [commodity, worldRegion]).map(r=>r.market_year);
  if(tableYearsRange !== 'full'){
    const n = parseInt(tableYearsRange, 10);
    years = years.slice(-n);
  }
  const lastYr = years[years.length-1];

  document.getElementById('tblHeadRow').innerHTML = `<th>Country</th>` + years.map(y=>`<th>${y}</th>`).join('');

  function rowCellsMeasure(region, meas){
    return years.map(yr => { const v = latestValue(commodity, region, yr, meas); return `<td>${v!=null?v.toFixed(1):'—'}</td>`; }).join('');
  }
  function rowCellsRaw(region, attrs){
    return years.map(yr => { const v = latestValueRaw(commodity, region, yr, attrs); return `<td>${v!=null?v.toFixed(1):'—'}</td>`; }).join('');
  }
  // ordena de maior pra menor (usando o ultimo ano visivel); "World" sempre primeiro
  function sortedRegions(attrs){
    const others = selectedRegions.filter(r=>r!=='World');
    const scored = others.map(r => ({r, v: latestValueRaw(commodity, r, lastYr, attrs) ?? -Infinity}));
    scored.sort((a,b)=>b.v-a.v);
    const ordered = scored.map(s=>s.r);
    return selectedRegions.includes('World') ? ['World', ...ordered] : ordered;
  }
  function countryBreakdown(attrs, cssClass){
    return sortedRegions(attrs).map(r => `<tr class="${cssClass}${r==='World'?' metric':''}"><td>${r}</td>${rowCellsRaw(r, attrs)}</tr>`).join('');
  }

  let rows = '';

  if(tableMode === 'simplified'){
    rows += `<tr class="grp"><td>Production</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown(['Production'], 'sub');

    rows += `<tr class="grp"><td>Domestic Consumption</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown([domesticAttr], 'sub');

    rows += `<tr class="metric"><td>Ending Stocks</td>${rowCellsMeasure(worldRegion, 'ending_stocks')}</tr>`;

    const stuCells = years.map(yr => { const v = latestValue(commodity, worldRegion, yr, 'stock_to_use'); return `<td>${v!=null?(v.toFixed(1)+'%'):'—'}</td>`; }).join('');
    rows += `<tr class="stu-row"><td>Stock-to-Use</td>${stuCells}</tr>`;
  } else {
    // Complete: sem as linhas divisorias "Supply"/"Demand" e sem Stock-to-Use --
    // so os componentes (agora incluindo Beginning Stocks, que faz parte da
    // formula de Supply mas antes nao aparecia em lugar nenhum da tabela).
    rows += `<tr class="subgrp"><td>Beginning Stocks</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown(['Beginning Stocks'], 'sub');
    rows += `<tr class="subgrp"><td>Production</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown(['Production'], 'sub');
    rows += `<tr class="subgrp"><td>Imports</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown(['Imports'], 'sub');

    rows += `<tr class="subgrp"><td>Domestic Use</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown([domesticAttr], 'sub');
    rows += `<tr class="subgrp"><td>Exports</td>${years.map(()=>'<td></td>').join('')}</tr>`;
    rows += countryBreakdown(['Exports'], 'sub');

    rows += `<tr class="metric"><td>Ending Stocks</td>${rowCellsMeasure(worldRegion, 'ending_stocks')}</tr>`;
  }

  document.getElementById('tblBody').innerHTML = rows || `<tr><td colspan="${years.length+1}">Select at least one country</td></tr>`;
}

function renderRevisionChart(){
  const isStu = chartMeasure === 'stock_to_use';
  const region = isStu ? 'World' : stuCountry; // S:U sempre World+Simplified, ignora o filtro de Regiao
  const regions = [region];
  const attrs = attrsForMeasure(commodity, chartMeasure);
  const unit = isStu ? '%' : getUnit(commodity, attrs || CMDTY_CONFIG[commodity].supply);

  const note = document.getElementById('revNote');
  note.textContent = isStu
    ? 'Stock-to-Use is always World, Simplified (Ending Stocks / Domestic Use) — the Region filter above does not apply to this measure.'
    : '';

  let labels = [];
  const datasets = regions.map(r => {
    const s = getSeries(commodity, r, chartYear, chartMeasure);
    if(s.length > labels.length) labels = s.map(x=>x.report_title);
    return {region:r, s};
  });

  const chartDatasets = datasets.filter(d=>d.s.length).map(d => ({
    label: d.region,
    data: labels.map(lab => { const m = d.s.find(x=>x.report_title===lab); return m ? m.value : null; }),
    borderColor: '#FF5500', backgroundColor: '#FF5500',
    borderWidth:2.5, pointRadius:3, tension:.2, spanGaps:true,
  }));

  if(chartRevision) chartRevision.destroy();
  chartRevision = new Chart(document.getElementById('chartRevision'), {
    type:'line',
    data:{labels: labels.map(l=>l.replace(' 20',"'")), datasets: chartDatasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', onClick:()=>{}, labels:{boxWidth:10, font:{size:10}, color:'#333'}},
        tooltip:{callbacks:{label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(1):'—'} ${unit}`}} },
      scales:{ x:{ticks:{font:{size:9},color:'#000'}, grid:{display:false}, border:{color:'#000',width:1.5}},
               y:{ticks:{font:{size:9},color:'#000'}, grid:{color:'#EEE'}, title:{display:true,text:unit,font:{size:9},color:'#000'}} }
    }
  });
}

function renderEIChart(){
  const region = stuCountry;
  let years = q(`SELECT DISTINCT market_year FROM wasde_facts WHERE commodity=? AND region='World' ORDER BY market_year ASC`, [commodity]).map(r=>r.market_year);
  if(tableYearsRange !== 'full'){ years = years.slice(-parseInt(tableYearsRange,10)); }

  const getV = (yr, attr) => region==='Others' ? othersRawLatest(commodity, yr, [attr]) : latestRaw(commodity, region, yr, [attr]);
  const points = years.map(yr => {
    const exp = getV(yr, 'Exports');

const CORN_BUSHELS_PER_MT = 39.368; // fator padrao de conversao USDA p/ milho

function renderBridgeChart(){
  const region = stuCountry;
  const yr = chartYear;
  const note = document.getElementById('bridgeNote');
  note.textContent = '';

  const getV = (attr, forceRegion) => {
    const r = forceRegion || region;
    return r==='Others' ? othersRawLatest(commodity, yr, [attr]) : latestRaw(commodity, r, yr, [attr]);
  };

  const bs = getV('Beginning Stocks');
  const prod = getV('Production');
  const imp = getV('Imports');
  const es = getV('Ending Stocks');
  const supply = (bs!=null && prod!=null && imp!=null) ? bs+prod+imp : null;

  let demandParts = [];

  if(commodity === 'Oilseed, Soybean'){
    const crush = getV('Domestic Crush');
    const domTotal = getV('Domestic Total');
    const exports = getV('Exports');
    const other = (domTotal!=null && crush!=null) ? domTotal-crush : null;
    demandParts = [
      {label:'Exports', value: exports},
      {label:'Domestic Crush', value: crush},
      {label:'Other Dom. Cons.', value: other},
    ];
  } else if(commodity === 'Corn'){
    const exports = getV('Exports');
    if(region === 'United States'){
      const feedBu = getV('Feed and Residual', 'United States');
      const fsiBu = getV('Food, Seed & Industrial', 'United States');
      demandParts = [
        {label:'Exports', value: exports},
        {label:'Feed & Residual', value: feedBu!=null ? feedBu/CORN_BUSHELS_PER_MT : null},
        {label:'Food, Seed & Industrial', value: fsiBu!=null ? fsiBu/CORN_BUSHELS_PER_MT : null},
      ];
    } else {
      note.textContent = `Feed & Residual / Food, Seed & Industrial breakdown is only published by USDA for United States — showing Domestic Total instead for ${region}.`;
      demandParts = [
        {label:'Exports', value: exports},
        {label:'Domestic Total', value: getV('Domestic Total')},
      ];
    }
  } else if(commodity === 'Cotton'){
    demandParts = [
      {label:'Exports', value: getV('Exports')},
      {label:'Domestic Use', value: getV('Domestic Use')},
      {label:'Loss', value: getV('Loss')},
    ];
  }

  const demand = demandParts.every(p=>p.value!=null) ? demandParts.reduce((s,p)=>s+p.value,0) : null;
  const unit = getUnit(commodity, ['Production']);

  const categories = ['Beginning\nStocks', 'Production', 'Imports', ...demandParts.map(p=>p.label), 'Ending\nStocks'];
  const isAnchor = (i) => i===0 || i===(categories.length-1);

  const barRanges = [];
  barRanges.push(bs!=null ? [0, bs] : [null,null]);
  barRanges.push((bs!=null && prod!=null) ? [bs, bs+prod] : [null,null]);
  barRanges.push((bs!=null && prod!=null && imp!=null) ? [bs+prod, bs+prod+imp] : [null,null]);

  let running = supply;
  demandParts.forEach(p => {
    if(running==null || p.value==null){ barRanges.push([null,null]); running = null; return; }
    barRanges.push([running - p.value, running]);
    running -= p.value;
  });
  barRanges.push(es!=null ? [0, es] : [null,null]);

  const isSupplySide = (i) => i===1 || i===2; // Production, Imports
  const colors = categories.map((c,i) => isAnchor(i) ? '#FF5500' : (isSupplySide(i) ? '#333333' : '#999999'));

  if(chartBridge) chartBridge.destroy();
  chartBridge = new Chart(document.getElementById('chartBridge'), {
    type:'bar',
    data:{ labels: categories, datasets:[{
      label: `${commodity} — ${region} — MY ${yr}`,
      data: barRanges,
      backgroundColor: colors,
      borderRadius: 2,
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{callbacks:{label: ctx => {
          const v = ctx.raw; if(!v || v[0]==null) return 'No data';
          return `${Math.abs(v[1]-v[0]).toFixed(1)} ${unit}`;
        }}} },
      scales:{
        x:{ticks:{font:{size:9},color:'#000'}, grid:{display:false}, border:{color:'#000',width:1.5}},
        y:{ticks:{font:{size:9},color:'#000'}, grid:{color:'#EEE'}, title:{display:true,text:unit,font:{size:9},color:'#000'}},
      }
    }
  });

  const legendText = 'Orange = Beginning/Ending Stocks · Dark gray = Supply components (Production, Imports) · Light gray = Demand components';
  note.textContent = note.textContent ? `${note.textContent} ${legendText}` : legendText;
}

function renderSTUTrend(){
  const cfg = CMDTY_CONFIG[commodity];
  const region = stuCountry;
  let years = q(`SELECT DISTINCT market_year FROM wasde_facts WHERE commodity=? AND region=? ORDER BY market_year ASC`, [commodity, region]).map(r=>r.market_year);
  if(tableYearsRange !== 'full'){
    const n = parseInt(tableYearsRange, 10);
    years = years.slice(-n);
  }
  const domesticAttr = cfg.directTotals ? null : cfg.demand[0];
  const stuIsRatio = cfg.directTotals; // reservado p/ commodities com ratio oficial direto da USDA (nenhuma no momento)

  const points = years.map(yr => {
    let stuVal;
    if(stuIsRatio){
      const maxWn = q(`SELECT MAX(wasde_number) as wn FROM wasde_facts WHERE commodity=? AND region=? AND market_year=?`, [commodity, region, yr])[0]?.wn;
      if(!maxWn){ stuVal = null; }
      else {
        const r = q(`SELECT value FROM wasde_facts WHERE commodity=? AND region=? AND market_year=? AND attribute=? AND wasde_number=?`, [commodity, region, yr, cfg.stockToUseAttr[0], maxWn]);
        stuVal = r.length ? r[0].value : null;
      }
    } else {
      const s = worldStockToUseSeries(commodity, yr).filter(r=>r.value!=null);
      stuVal = s.length ? s[s.length-1].value : null;
    }

    let surplus = null;
    if(domesticAttr){
      const prod = region==='Others' ? othersRawLatest(commodity, yr, ['Production']) : latestRaw(commodity, region, yr, ['Production']);
      const dom = region==='Others' ? othersRawLatest(commodity, yr, [domesticAttr]) : latestRaw(commodity, region, yr, [domesticAttr]);
      if(prod!=null && dom!=null) surplus = prod - dom;
    }

    return {year: yr, stu: stuVal, surplus};
  });

  const unit = getUnit(commodity, ['Production']);
  const stuLabel = 'Stock-to-Use %';

  if(chartSTU) chartSTU.destroy();
  chartSTU = new Chart(document.getElementById('chartSTU'), {
    data:{ labels: points.map(p=>p.year), datasets:[
      { type:'bar', label:`Surplus/Deficit (${unit})`, data: points.map(p=>p.surplus),
        backgroundColor: points.map(p=>p.surplus>=0?'#333333':'#C0392B'), yAxisID:'y', order:2 },
      { type:'line', label:stuLabel, data: points.map(p=>p.stu),
        borderColor:'#FF5500', backgroundColor:'#FF5500', borderWidth:2.5, pointRadius:2.5, tension:.2, spanGaps:true, yAxisID:'y1', order:1 },
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', onClick:()=>{}, labels:{boxWidth:10, font:{size:10}, color:'#333'}},
        tooltip:{callbacks:{label: ctx => ctx.dataset.yAxisID==='y1' ? `${stuLabel}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(1):'—'}%` : `Surplus/Deficit: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(1):'—'} ${unit}`}} },
      scales:{
        x:{ticks:{font:{size:9},color:'#000', maxRotation:60, minRotation:60}, grid:{display:false}, border:{color:'#000',width:1.5}},
        y:{position:'left', ticks:{font:{size:9},color:'#000'}, grid:{color:'#EEE'}, title:{display:true,text:'Surplus/Deficit',font:{size:9},color:'#000'}},
        y1:{position:'right', ticks:{font:{size:9},color:'#FF5500'}, grid:{display:false}, title:{display:true,text:stuLabel,font:{size:9},color:'#FF5500'}},
      }
    }
  });
}

// ══ INIT ═════════════════════════════════════════════════════════════════════
async function init(){
  try{
    const SQL = await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
    const resp = await fetch('./wasde.db');
    if(!resp.ok) throw new Error(`wasde.db not found (HTTP ${resp.status}). Run wasde.py backfill first, then commit wasde.db.`);
    db = new SQL.Database(new Uint8Array(await resp.arrayBuffer()));

    const lastRow = q(`SELECT MAX(wasde_number) as wn FROM wasde_facts`)[0];
    const titleRow = q(`SELECT report_title FROM wasde_facts WHERE wasde_number=? LIMIT 1`, [lastRow.wn])[0];
    document.getElementById('last-upd').textContent = titleRow ? `Latest: ${titleRow.report_title}` : '';

    buildLayout();
    buildCommoditySelect();
    onCommodityChange();
  }catch(e){
    document.getElementById('root').innerHTML = `<div class="error-box">
      <strong>⚠ ${e.message}</strong><br><br>
      1. Run <code>python wasde.py backfill</code> (or <code>monthly</code>)<br>
      2. Commit <code>wasde.db</code> to <code>Wasde/</code> on GitHub<br>
      3. Reload this page
    </div>`;
  }
}
init();
