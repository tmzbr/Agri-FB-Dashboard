name: Coleta Completa

on:
  schedule:
    - cron: '0 6 * * *'  # 03:00 BRT
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Coletar Mercearia
        run: python "Supermarket Prices/scraper.py" Mercearia
      - name: Coletar Cervejas
        run: python "Supermarket Prices/scraper.py" Cervejas
      - name: Coletar Carnes
        run: python "Supermarket Prices/scraper.py" Carnes
      - name: Coletar Biscoitos e Massas
        run: python "Supermarket Prices/scraper.py" Biscoitos Massas
      - name: Gerar dashboard
        run: python "Supermarket Prices/gerar_dashboard.py"
      - name: Commit e push
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          cp "Supermarket Prices/precos.db" /tmp/precos_local.db
          cp "Supermarket Prices/supermarket_prices.html" /tmp/html_local.html
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/precos_local.db "Supermarket Prices/precos.db"
          cp /tmp/html_local.html "Supermarket Prices/supermarket_prices.html"
          git add "Supermarket Prices/"
          git diff --staged --quiet || git commit -m "Coleta Completa: $(date '+%d/%m/%Y %H:%M')"
          git push origin main
