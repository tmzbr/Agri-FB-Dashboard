name: Refresh BZ Chicken DB

on:
  # Run every weekday at 20:00 UTC (17:00 BRT / 13:00 NYC) — after CEPEA
  # publishes the day's closing prices (usually ~16h BRT / 19h UTC)
  schedule:
    - cron: '0 20 * * 1-5'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

  # Also run on any push that touches the extractor
  push:
    paths:
      - 'Chicken/BZ Tracker/extractor_chicken_bz.py'

jobs:
  refresh-db:
    runs-on: ubuntu-latest

    # Give the job write access so it can commit the updated DB back to the repo
    permissions:
      contents: write

    defaults:
      run:
        # All commands run from the tracker sub-directory
        working-directory: Chicken/BZ Tracker

    steps:
      # ── 1. Checkout the repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install Python dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ── 4. Run the extractor (incremental update) ────────────────────────
      #    --init would reseed from scratch; omit it here so we only fetch
      #    new data and leave the existing DB intact.
      - name: Run extractor
        run: python extractor_chicken_bz.py

      # ── 5. Commit and push the updated DB if it changed ──────────────────
      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chicken_bz.db
          # Only commit if the DB actually changed
          if git diff --cached --quiet; then
            echo "No changes to chicken_bz.db — nothing to commit."
          else
            git commit -m "auto: refresh chicken_bz.db + CEPEA daily — $(date -u +'%Y-%m-%d %H:%M') UTC"
            # Merge any remote commits that arrived since checkout.
            # -X ours: in a binary-file conflict the freshly generated DB wins.
            git pull origin main --no-rebase -X ours
            git push
          fi
