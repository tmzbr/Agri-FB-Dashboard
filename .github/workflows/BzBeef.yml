name: Update BZ Beef Tracker DB

on:
  # Every day at 08:00 UTC (05:00 BRT). BCB PTAX and weekly SECEX prices
  # update frequently; daily runs keep FX and spread current.
  schedule:
    - cron: '0 8 * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (e.g. SECEX data gap correction)'
        required: false
        default: 'Manual update'

jobs:
  update-bz-db:
    name: Refresh beef_bz.db
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run extractor_bz.py
        working-directory: Beef/BZ Tracker
        run: python extractor_bz.py

      - name: Verify beef_bz.db
        working-directory: Beef/BZ Tracker
        run: |
          python3 - <<'EOF'
          import sqlite3, os
          db_path = "beef_bz.db"
          if not os.path.exists(db_path):
              raise FileNotFoundError("beef_bz.db was not created!")
          con = sqlite3.connect(db_path)
          nm = con.execute("SELECT COUNT(*) FROM monthly").fetchone()[0]
          nw = con.execute("SELECT COUNT(*) FROM weekly").fetchone()[0]
          latest = con.execute(
              "SELECT period, updated_at FROM monthly ORDER BY year DESC, month DESC LIMIT 1"
          ).fetchone()
          con.close()
          print(f"beef_bz.db OK: {nm} monthly rows, {nw} weekly rows, latest={latest[0]}, updated={latest[1]}")
          if nm < 50:
              raise ValueError(f"Suspiciously few monthly rows: {nm}")
          EOF

      - name: Commit updated beef_bz.db
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add "Beef/BZ Tracker/beef_bz.db"
          if git diff --staged --quiet; then
            echo "No changes to beef_bz.db — skipping commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: refresh beef_bz.db — ${TIMESTAMP}"
            git pull origin main --no-rebase -X ours
            git push
            echo "beef_bz.db committed and pushed."
          fi
