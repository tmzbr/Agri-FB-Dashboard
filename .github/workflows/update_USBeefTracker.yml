name: Weekly Beef Data Update

on:
  schedule:
    - cron: '0 12 * * 2'   # toda terça às 12h UTC (9h Brasília)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl pdfplumber

      - name: Fetch latest data & update beef.db
        run: python "Beef/U.S. Tracker/extractor_beef.py"

      - name: Commit updated beef.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp "Beef/U.S. Tracker/beef.db" /tmp/beef.db
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/beef.db "Beef/U.S. Tracker/beef.db"
          git add "Beef/U.S. Tracker/beef.db"
          git diff --staged --quiet || git commit -m "chore: weekly beef data update $(date +'%Y-%m-%d')"
          git push origin HEAD:main
