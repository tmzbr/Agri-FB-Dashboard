name: IMEA Scraper – Custos de Produção MT

on:
  # Carga histórica + atualizações mensais: disparo manual
  workflow_dispatch:
  # Roda automaticamente todo dia entre 10–20 de cada mês, 08h00 BRT
  schedule:
    - cron: "0 11 10-20 * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: pip install requests pandas openpyxl

      - name: Roda scraper
        env:
          IMEA_USER: ${{ secrets.IMEA_USER }}
          IMEA_PASS: ${{ secrets.IMEA_PASS }}
        run: python "Agri Monitor/imea/extractor_imea.py"

      - name: Commit do banco
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Agri Monitor/imea/" || true
          git diff --cached --quiet || git commit -m "chore: atualização automática IMEA [$(date +'%Y-%m-%d')]"
          git push
