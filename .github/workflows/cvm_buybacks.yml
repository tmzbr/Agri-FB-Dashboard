name: Update CVM Buybacks DB (v2 — IPE Individual)

on:
  schedule:
    - cron: "0 10 * * 1,4"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Bootstrap (puxa histórico completo desde 2022)"
        required: false
        default: "false"
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: "CVM Buybacks"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas requests pdfplumber

      - name: Run ingestion (incremental)
        if: ${{ github.event.inputs.bootstrap != 'true' }}
        run: python cvm_buybacks.py

      - name: Run ingestion (bootstrap)
        if: ${{ github.event.inputs.bootstrap == 'true' }}
        run: python cvm_buybacks.py --bootstrap

      - name: Commit DB + HTMLs
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "CVM Buybacks/cvm_buybacks.db"
          [ -f "CVM Buybacks/cvm_buybacks.html" ] && git add "CVM Buybacks/cvm_buybacks.html"
          [ -f "CVM Buybacks/cvm_insider.html"  ] && git add "CVM Buybacks/cvm_insider.html"
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "auto: refresh dashboard — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi
