name: Update CVM Buybacks DB (v2 — IPE Individual)

on:
  # Toda segunda e quinta-feira às 10:00 UTC (07:00 BRT).
  # IPEs individuais são publicados mensalmente, mas verificamos
  # frequentemente para capturar reapresentações.
  schedule:
    - cron: "0 10 * * 1,4"

  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Bootstrap (puxa histórico completo desde 2022)"
        required: false
        default: "false"
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: "CVM Buybacks"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas requests pdfplumber

      - name: Run ingestion (incremental)
        if: ${{ github.event.inputs.bootstrap != 'true' }}
        run: python cvm_buybacks.py

      - name: Run ingestion (bootstrap)
        if: ${{ github.event.inputs.bootstrap == 'true' }}
        run: python cvm_buybacks.py --bootstrap

      - name: Commit DB
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "CVM Buybacks/cvm_buybacks.db"
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "auto: refresh cvm_buybacks.db — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
