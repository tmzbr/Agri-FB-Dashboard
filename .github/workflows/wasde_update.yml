name: WASDE - Atualizacao mensal / Backfill

on:
  schedule:
    # Roda TODO DIA entre 8 e 15 de cada mes, as 15:00 UTC (12:00 em Brasilia).
    # O WASDE normalmente sai entre dia 8-12; essa janela cobre folga de
    # feriado/atraso. Se o relatorio do mes ainda nao saiu, o script detecta
    # (404), loga como "not_found" e encerra sem erro -- so tenta de novo no
    # dia seguinte. Se ja foi processado, e idempotente e nao faz nada.
    - cron: '0 15 8-15 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "O que rodar"
        required: true
        default: "monthly"
        type: choice
        options:
          - monthly            # busca so o mes atual
          - backfill_full       # historico completo (zips 2010-2020 + meses individuais)
          - backfill_recent      # so meses individuais 2021+ (sem baixar os zips)
          - wap_backfill_recent  # so o WAP (Area Harvested/Yield por pais), sem mexer no WASDE

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pdfplumber

      - name: Rodar atualizacao mensal (WASDE)
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'monthly'
        working-directory: Wasde
        run: python wasde.py monthly

      - name: Rodar atualizacao mensal (WAP -- Area Harvested/Yield por pais)
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'monthly'
        working-directory: Wasde
        run: python wasde.py wap-monthly
        continue-on-error: true

      - name: Rodar backfill completo
        if: github.event.inputs.mode == 'backfill_full'
        working-directory: Wasde
        run: python wasde.py backfill

      - name: Rodar backfill (so 2021+)
        if: github.event.inputs.mode == 'backfill_recent'
        working-directory: Wasde
        run: python wasde.py backfill --skip-zips

      - name: Rodar backfill do WAP
        if: github.event.inputs.mode == 'wap_backfill_recent'
        working-directory: Wasde
        run: python wasde.py wap-backfill --max-minutes 170

      - name: Commitar banco atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Wasde/wasde.db
          git diff --cached --quiet || git commit -m "auto: refresh wasde.db — $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
