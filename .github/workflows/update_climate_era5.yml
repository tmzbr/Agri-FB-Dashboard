name: Update Climate — ERA5 (manual)

# ERA5 (Open-Meteo archive) tem rate limit horário/diário e, em runner do GitHub
# (IP compartilhado), pode demorar; por isso é manual. O builder já é resiliente
# (espera a virada da hora e é resumível). Rode quando quiser refrescar o ERA5.

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild ERA5 history (Weather + Sugar)
        run: |
          rm -f "Climate Monitor/Weather Monitor/_hist_era5_cache.json" "Climate Monitor/Sugar Monitor/_hist_era5_cache.json"
          python "Climate Monitor/Weather Monitor/build_history.py"
          python "Climate Monitor/Sugar Monitor/build_history.py"

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Climate Monitor/Weather Monitor/history_era5.json" "Climate Monitor/Sugar Monitor/history_era5.json"
          git diff --cached --quiet && { echo "nada a commitar"; exit 0; }
          git commit -m "auto: refresh ERA5 climate history $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push
