<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>U.S. Beef Packer Margin Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root{
  --or:#FF5500;--bk:#333333;--gy:#888888;
  --bg:#F4F4F4;--bd:#E5E5E5;--wh:#FFFFFF;
  --gr:#27AE60;--rd:#C0392B;
  --font:'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--bk);font-size:12px;}

.hdr{background:var(--wh);border-bottom:3px solid var(--or);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:14px;font-weight:700;color:var(--or);}
.hdr-sub{font-size:10px;color:var(--gy);margin-top:2px;}
.hdr-right{font-size:10px;color:var(--gy);}

.nav-strip{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.tabs{display:flex;}
.tab{padding:9px 18px;font-size:12px;font-weight:600;color:var(--gy);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.tab:hover{color:var(--bk);}
.tab.active{color:var(--or);border-bottom-color:var(--or);}

.view-ctrl{display:flex;align-items:center;gap:8px;padding:6px 0;}
.view-lbl{font-size:10px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.4px;}
.toggle-group{display:flex;border:1px solid var(--bd);border-radius:4px;overflow:hidden;}
.tog-btn{padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;background:var(--wh);color:var(--gy);border:none;font-family:var(--font);transition:all .15s;}
.tog-btn.active{background:var(--or);color:var(--wh);}

.content{padding:14px 24px;display:flex;flex-direction:column;gap:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.row-bot{display:grid;grid-template-columns:270px 1fr;gap:14px;}

.card{background:var(--wh);border:1px solid var(--bd);border-radius:6px;padding:16px;}
.card-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--or);}
.card-title{font-size:12px;font-weight:700;color:var(--bk);}
.card-stat{font-size:10px;color:var(--gy);}
canvas{max-height:215px;}

/* Control panel */
.cp-section{margin-bottom:12px;}
.cp-section-label{font-size:10px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.cp-row{display:flex;align-items:center;margin-bottom:6px;gap:6px;}
.cp-lbl{font-size:11px;color:var(--bk);width:80px;flex-shrink:0;}
.cp-lbl.auto{color:var(--gy);font-style:italic;}
.cp-slider{flex:1;accent-color:var(--or);cursor:pointer;}
.cp-val{font-size:11px;font-weight:700;color:var(--or);width:38px;text-align:right;flex-shrink:0;}
.cp-val.auto{color:var(--gy);font-weight:400;}
.cp-divider{border:none;border-top:1px solid var(--bd);margin:10px 0;}
.btn-reset{width:100%;padding:7px;background:transparent;border:1.5px solid var(--or);color:var(--or);font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;transition:all .15s;font-family:var(--font);}
.btn-reset:hover{background:var(--or);color:var(--wh);}

/* Cost breakdown */
.cb-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}
.cb-head{font-size:10px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.cb-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.cb-lbl{font-size:11px;color:var(--bk);width:80px;flex-shrink:0;}
.cb-track{flex:1;background:#F0F0F0;border-radius:2px;height:7px;overflow:hidden;}
.cb-fill{height:100%;border-radius:2px;transition:width .3s ease;}
.cb-pct{font-size:11px;font-weight:700;color:var(--bk);width:34px;text-align:right;flex-shrink:0;}
.cb-row.sub .cb-lbl{font-size:10px;color:var(--gy);padding-left:12px;}
.cb-row.sub .cb-pct{font-size:10px;color:var(--gy);font-weight:400;}

/* Footnote */
.footnote{font-size:10px;color:#888;margin-top:6px;font-style:italic;}

/* Table */
.tbl-wrap{overflow-x:auto;margin-top:4px;}
table{width:100%;border-collapse:collapse;font-size:10.5px;}
thead th{padding:7px 9px;text-align:right;color:var(--gy);font-weight:700;text-transform:uppercase;font-size:9.5px;letter-spacing:.3px;border-bottom:2px solid var(--or);white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody tr{border-bottom:1px solid var(--bd);}
tbody tr:hover{background:#FFF5EC;}
tbody td{padding:5px 9px;text-align:right;white-space:nowrap;}
tbody td:first-child{text-align:left;font-weight:600;}
.ov{color:var(--or);font-weight:700;}
.pos{color:var(--gr);}
.neg{color:var(--rd);}

.src{font-size:9px;color:#BBB;margin-top:10px;}
.loading{text-align:center;padding:60px 24px;color:var(--gy);}
.spinner{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#FFF8F8;border:1px solid #FFCCCC;border-radius:6px;padding:16px;color:var(--rd);margin:24px;font-size:12px;line-height:1.8;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">U.S. Beef Packer Margin Tracker</div>
    <div class="hdr-sub">Quarterly spread model vs. reported gross margins — MBRF / National Beef · JBS North America</div>
  </div>
  <div class="hdr-right" id="last-upd">—</div>
</div>

<div class="nav-strip">
  <div class="tabs">
    <div class="tab active" onclick="setCompany('MBRF',this)">MBRF</div>
    <div class="tab" onclick="setCompany('JBS',this)">JBS</div>
  </div>
  <div class="view-ctrl">
    <span class="view-lbl">View:</span>
    <div class="toggle-group" id="view-toggles">
      <button class="tog-btn" onclick="setView('ALL',this)">All</button>
      <button class="tog-btn active" onclick="setView('L3Y',this)">Last 3 Years</button>
      <button class="tog-btn" onclick="setView('L12M',this)">Last 12 Months</button>
    </div>
  </div>
</div>

<div id="root"><div class="loading"><div class="spinner"></div>Loading beef.db…</div></div>

<script>
// ══ CONSTANTS ════════════════════════════════════════════════════════════════
const CO_COLORS = { MBRF:'#FF5500', JBS:'#333333' };

// Default weights per company (no HH or Drop Credit)
const V4 = {
  MBRF: { choiceP:100, ksP:100, neP:0 },
  JBS:  { choiceP:70,  ksP:0,   neP:100 },
};

// Only start dates are hardcoded; end date always auto-extends to the last available quarter.
const CORR_WIN = { MBRF:'2Q23', JBS:'1Q24' };

// ══ STATE ════════════════════════════════════════════════════════════════════
let allQtr=[], allWk=[], allMon=[];
let company='MBRF', viewFrom='L3Y', tblMode='quarterly';

// Per-company independent weight state
const WByCompany = { MBRF:{...V4.MBRF}, JBS:{...V4.JBS} };
let W = WByCompany['MBRF'];

const CHARTS={};

// ══ SPREAD FORMULA ═══════════════════════════════════════════════════════════
function ctP(w){ w=w||W; return Math.max(0,100-w.ksP-w.neP); }

function calcSpread(row, snap){
  const w=snap||W;
  const ct=row.ct150_steer??row.ct150_all;
  if(!row.choice||!row.select_||!ct) return null;
  const ks=row.ks_avg??ct, ne=row.ne_avg??ct;
  const rev=(w.choiceP/100)*row.choice+(1-w.choiceP/100)*row.select_;
  const _ks=w.ksP/100, _ne=w.neP/100, _ct=ctP(w)/100;
  const sum=_ks+_ne+_ct||1;
  const cattle=(_ks*ks+_ne*ne+_ct*ct)/sum;
  return rev>0?(rev-cattle)/rev:null;
}

// ══ DATE / FILTER ════════════════════════════════════════════════════════════
function filteredQtr(){
  if(viewFrom==='ALL') return allQtr;
  if(!allQtr.length) return [];
  const lastD=new Date(allQtr[allQtr.length-1].quarter_start);
  let cutoff;
  if(viewFrom==='L3Y')  cutoff=new Date(lastD.getFullYear()-3, lastD.getMonth(),1);
  if(viewFrom==='L12M') cutoff=new Date(lastD.getFullYear()-1, lastD.getMonth(),1);
  return allQtr.filter(r=>new Date(r.quarter_start)>=cutoff);
}

function qToDate(q){
  const m=q.match(/([1-4])Q(\d{2})/);
  if(!m) return new Date(0);
  return new Date(2000+parseInt(m[2]),(parseInt(m[1])-1)*3,1);
}

// ══ FORMAT ═══════════════════════════════════════════════════════════════════
const p1 =v=>v==null?'—':(v*100).toFixed(1)+'%';
const n1 =v=>v==null?'—':v.toFixed(1);
const cls=v=>v==null?'':v>0?'pos':'neg';

function pearson(xs,ys){
  const pairs=xs.map((x,i)=>[x,ys[i]]).filter(([a,b])=>a!=null&&b!=null);
  if(pairs.length<3) return null;
  const mx=pairs.reduce((s,[a])=>s+a,0)/pairs.length;
  const my=pairs.reduce((s,[,b])=>s+b,0)/pairs.length;
  const num=pairs.reduce((s,[a,b])=>s+(a-mx)*(b-my),0);
  const dx=Math.sqrt(pairs.reduce((s,[a])=>s+(a-mx)**2,0));
  const dy=Math.sqrt(pairs.reduce((s,[,b])=>s+(b-my)**2,0));
  return dx*dy<1e-10?0:num/(dx*dy);
}

// ══ CHART HELPERS ════════════════════════════════════════════════════════════
const TT={backgroundColor:'#fff',titleColor:'#333',bodyColor:'#555',borderColor:'#E5E5E5',borderWidth:1};

function axisL(label,unit='%'){
  return{position:'left',border:{color:'#555'},grid:{color:'#EEEEEE'},
    ticks:{color:'#555',font:{size:10},callback:v=>v+unit},
    title:{display:!!label,text:label,color:'#555',font:{size:10}}};
}
function axisR(label,unit='%'){
  return{position:'right',border:{color:'#999'},grid:{drawOnChartArea:false},
    ticks:{color:'#999',font:{size:10},callback:v=>v+unit},
    title:{display:!!label,text:label,color:'#999',font:{size:10}}};
}
const axisX=()=>({border:{color:'#333'},grid:{color:'#EEEEEE'},
  ticks:{color:'#333',font:{size:9},maxRotation:45}});

function mkChart(id,cfg){
  if(CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id]=new Chart(document.getElementById(id).getContext('2d'),cfg);
}

// ══ RENDER ═══════════════════════════════════════════════════════════════════
function renderAll(){ renderBars(); renderTimeline(); renderTable(); updateCostBreakdown(); }

// ── Left: ΔSpread vs ΔMargin — single axis ───────────────────────────────────
function renderBars(){
  const rows=filteredQtr();
  const statEl=document.getElementById('corr-stat');
  const qs=CORR_WIN[company]||'1Q18';
  // End is always the last available quarter — no hardcoded upper bound.
  const slice=rows.filter(r=>new Date(r.quarter_start)>=qToDate(qs));
  const getM=r=>company==='MBRF'?r.mbrf_gm:r.jbs_gm;
  const labels=[],dsSp=[],dsMg=[];
  for(let i=1;i<slice.length;i++){
    const c=slice[i],p=slice[i-1];
    const sc=calcSpread(c),sp=calcSpread(p);
    const mc=getM(c),mp=getM(p);
    labels.push(c.quarter);
    dsSp.push(sc!=null&&sp!=null?+((sc-sp)*100).toFixed(2):null);
    dsMg.push(mc!=null&&mp!=null?+((mc-mp)*100).toFixed(2):null);
  }
  const r=pearson(dsSp,dsMg);
  statEl.textContent=r!=null?`r = ${r.toFixed(3)}   R² = ${(r*r).toFixed(3)}   N = ${dsSp.filter(v=>v!=null).length}`:'Insufficient data';
  mkChart('chartCorr',{type:'bar',
    data:{labels,datasets:[
      {label:'ΔSpread',    data:dsSp,backgroundColor:'#FF5500CC',yAxisID:'y'},
      {label:'ΔGross Mgn',data:dsMg,backgroundColor:'#33333388',yAxisID:'y'},
    ]},
    options:{
      plugins:{legend:{display:true,labels:{color:'#333',font:{size:10}}},
        tooltip:{...TT,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw!=null?(ctx.raw>0?'+':'')+ctx.raw+'pp':'—'}`}}},
      scales:{x:axisX(), y:axisL('pp','pp')},
    }});
}

// ── Right: Spread % & Gross Margin % — per-company weights ───────────────────
function renderTimeline(){
  const rows=filteredQtr();
  const labels=rows.map(r=>r.quarter);
  const col=CO_COLORS[company];
  const snap=WByCompany[company];
  const gmFn=r=>company==='MBRF'?r.mbrf_gm:r.jbs_gm;
  const datasets=[
    {
      label:`${company} Spread`,
      data:rows.map(r=>{const s=calcSpread(r,snap);return s!=null?+(s*100).toFixed(2):null;}),
      borderColor:col, borderWidth:2.5,
      pointRadius:3, pointHoverRadius:5,
      tension:.3, fill:false, spanGaps:true, yAxisID:'y',
    },
    {
      label:`${company} Gross Mgn%`,
      data:rows.map(r=>{const m=gmFn(r);return m!=null?+(m*100).toFixed(2):null;}),
      borderColor:col, borderWidth:1.5,
      borderDash:[6,3], pointRadius:2, pointHoverRadius:5,
      tension:.3, fill:false, spanGaps:true, yAxisID:'y2',
    },
  ];
  // Compute y2 range from active company's GM% values only, so the active
  // line always fills the axis rather than being squashed by the other company.
  const activeGmVals=rows.map(r=>{
    const v=company==='MBRF'?r.mbrf_gm:r.jbs_gm;
    return v!=null?+(v*100).toFixed(2):null;
  }).filter(v=>v!=null);
  let y2min=undefined, y2max=undefined;
  if(activeGmVals.length){
    const lo=Math.min(...activeGmVals), hi=Math.max(...activeGmVals);
    const pad=Math.max((hi-lo)*0.4, 1.5); // at least ±1.5pp padding
    y2min=+(lo-pad).toFixed(2);
    y2max=+(hi+pad).toFixed(2);
  }
  const y2Axis=axisR('Gross Margin %','%');
  if(y2min!==undefined){y2Axis.min=y2min; y2Axis.max=y2max;}

  const titleEl=document.getElementById('timeline-title');
  if(titleEl) titleEl.textContent=`Spread Proxy % vs. Gross Margin % — ${company}`;
  mkChart('chartTimeline',{type:'line',data:{labels,datasets},
    options:{
      plugins:{
        legend:{display:true,labels:{color:'#333',font:{size:10},
          generateLabels:chart=>chart.data.datasets.map((ds,i)=>({
            text:ds.label,fillStyle:ds.borderColor,strokeStyle:ds.borderColor,
            lineWidth:ds.borderWidth,lineDash:ds.borderDash||[],datasetIndex:i,hidden:false,
          }))}},
        tooltip:{...TT},
      },
      scales:{x:axisX(), y:axisL('Spread %','%'), y2:y2Axis},
    }});
  const other=company==='MBRF'?'JBS':'MBRF';
  const fn=document.getElementById('disc-note');
  if(fn) fn.textContent=`* Sliders adjust ${company} only — ${other} displayed at default weights.`;
}

// ── Cost Breakdown ────────────────────────────────────────────────────────────
// Shows the relative contribution of each cattle region to total cattle cost
// based on the mix weights and last quarter's actual prices.
function updateCostBreakdown(){
  if(!allQtr.length) return;
  const last=allQtr[allQtr.length-1];
  const w=W;
  const ct=last.ct150_steer??last.ct150_all??0;
  const ks=last.ks_avg??ct, ne=last.ne_avg??ct;
  const _ks=w.ksP/100, _ne=w.neP/100, _ct=ctP(w)/100;
  const sum=_ks+_ne+_ct||1;

  // Contribution of each region (in $/cwt terms)
  const ksVal =_ks*ks/sum, neVal=_ne*ne/sum, ctVal=_ct*ct/sum;
  const total =ksVal+neVal+ctVal||1;

  const ksPct=Math.round(ksVal/total*100);
  const nePct=Math.round(neVal/total*100);
  const ctPct=100-ksPct-nePct;

  const $=id=>document.getElementById(id);
  $('cb-ks-fill').style.width  =ksPct+'%';  $('cb-ks-pct').textContent  =ksPct+'%';
  $('cb-ne-fill').style.width  =nePct+'%';  $('cb-ne-pct').textContent  =nePct+'%';
  $('cb-ct-fill').style.width  =ctPct+'%';  $('cb-ct-pct').textContent  =ctPct+'%';
}

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTable(){
  const showMargin=(tblMode==='quarterly');
  const mLabel=company==='JBS'?'JBS GM%':'MBRF GM%';
  document.getElementById('tbl-head').innerHTML=`<tr>
    <th style="text-align:left">Period</th>
    <th>Choice $/cwt</th><th>Select $/cwt</th>
    <th>CT150 $/cwt</th><th>KS Avg $/cwt</th><th>NE Avg $/cwt</th>
    <th style="color:var(--or)">Spread%</th>
    ${showMargin?`<th style="color:var(--or)">${mLabel}</th>`:''}
  </tr>`;
  const rows=tblMode==='quarterly'?[...allQtr].reverse().slice(0,24):[...allMon].reverse().slice(0,24);
  const getM=r=>company==='MBRF'?r.mbrf_gm:r.jbs_gm;
  document.getElementById('tbl-body').innerHTML=rows.map(r=>{
    const sp=calcSpread(r), mg=showMargin?getM(r):null;
    return`<tr>
      <td>${r.quarter??r.month}</td>
      <td>${n1(r.choice)}</td><td>${n1(r.select_)}</td>
      <td>${n1(r.ct150_steer??r.ct150_all)}</td>
      <td>${n1(r.ks_avg)}</td><td>${n1(r.ne_avg)}</td>
      <td class="ov">${p1(sp)}</td>
      ${showMargin?`<td class="${cls(mg)}">${p1(mg)}</td>`:''}
    </tr>`;
  }).join('');
}

// ══ CONTROLS ═════════════════════════════════════════════════════════════════
function setCompany(co,el){
  company=co; W=WByCompany[co];
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  syncSliders(); renderAll();
}
function setView(v,el){
  viewFrom=v;
  document.querySelectorAll('#view-toggles .tog-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderAll();
}
function setTblMode(mode,el){
  tblMode=mode;
  document.querySelectorAll('.tbl-tog').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderTable();
}

function onSlider(key,val){
  if(key==='ksP'){
    W.ksP=parseInt(val);
    if(W.ksP+W.neP>100) W.neP=100-W.ksP;
  } else if(key==='neP'){
    W.neP=parseInt(val);
    if(W.ksP+W.neP>100) W.ksP=100-W.neP;
  } else {
    W[key]=parseInt(val);
  }
  syncSliders(); renderAll();
}

function syncSliders(){
  document.getElementById('sl-choice').value=W.choiceP;
  document.getElementById('sl-ks').value    =W.ksP;
  document.getElementById('sl-ne').value    =W.neP;
  updateLabels();
}
function updateLabels(){
  document.getElementById('v-choice').textContent=(W.choiceP)+'%';
  document.getElementById('v-select').textContent=(100-W.choiceP)+'%';
  document.getElementById('v-ks').textContent    =W.ksP+'%';
  document.getElementById('v-ne').textContent    =W.neP+'%';
  document.getElementById('v-ct').textContent    =ctP()+'%';
}
function resetWeights(){ WByCompany[company]={...V4[company]}; W=WByCompany[company]; syncSliders(); renderAll(); }

// ══ MONTHLY AGG ══════════════════════════════════════════════════════════════
function buildMonthly(wk){
  const grp={};
  wk.forEach(r=>{
    const d=new Date(r.week_ending);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    (grp[k]||(grp[k]=[])).push(r);
  });
  const avg=(rows,col)=>{const vs=rows.map(r=>r[col]).filter(v=>v!=null);return vs.length?vs.reduce((a,b)=>a+b)/vs.length:null;};
  return Object.entries(grp).sort().map(([month,rows])=>({month,
    choice:avg(rows,'choice'),select_:avg(rows,'select_'),
    ct150_steer:avg(rows,'ct150_steer'),ct150_all:avg(rows,'ct150_all'),
    ks_avg:avg(rows,'ks_avg'),ne_avg:avg(rows,'ne_avg')}));
}

// ══ LAYOUT ═══════════════════════════════════════════════════════════════════
function buildLayout(){
  document.getElementById('root').innerHTML=`
  <div class="content">
    <div class="row2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">QoQ ΔSpread vs. ΔGross Margin — by Quarter</span>
          <span class="card-stat" id="corr-stat"></span>
        </div>
        <canvas id="chartCorr"></canvas>
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-title" id="timeline-title">Spread Proxy % vs. Gross Margin %</span>
          <span class="card-stat">Solid = Spread · Dashed = Gross Mgn</span>
        </div>
        <canvas id="chartTimeline"></canvas>
        <div class="footnote" id="disc-note">* Sliders adjust MBRF only — JBS displayed at default weights.</div>
      </div>
    </div>
    <div class="row-bot">

      <!-- Control panel -->
      <div class="card">
        <div class="card-hdr"><span class="card-title">Weight Parameters</span></div>

        <div class="cp-section">
          <div class="cp-section-label">Revenue Mix</div>
          <div class="cp-row">
            <span class="cp-lbl">Choice</span>
            <input id="sl-choice" class="cp-slider" type="range" min="0" max="100" step="1"
              oninput="onSlider('choiceP',this.value)">
            <span class="cp-val" id="v-choice">100%</span>
          </div>
          <div class="cp-row">
            <span class="cp-lbl auto">Select (auto)</span>

// ══ INIT ═════════════════════════════════════════════════════════════════════
async function init(){
  try{
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`});
    const resp=await fetch('./beef.db');
    if(!resp.ok) throw new Error(`beef.db not found (HTTP ${resp.status}). Run extractor_beef.py --history first, then commit beef.db.`);
    const db=new SQL.Database(new Uint8Array(await resp.arrayBuffer()));
    const toArr=res=>{
      if(!res.length) return [];
      const{columns,values}=res[0];
      return values.map(row=>Object.fromEntries(columns.map((c,i)=>[c,row[i]])));
    };
    allQtr=toArr(db.exec('SELECT * FROM beef_quarterly ORDER BY quarter_start ASC'));
    allWk =toArr(db.exec('SELECT * FROM beef_weekly  ORDER BY week_ending  ASC'));
    allMon=buildMonthly(allWk);
    db.close();
    if(!allQtr.length) throw new Error('beef_quarterly is empty — run extractor_beef.py --history first.');
    document.getElementById('last-upd').textContent=`Latest: ${allQtr[allQtr.length-1].quarter}`;
    buildLayout();
    syncSliders();
    renderAll();
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="error-box">
      <strong>⚠ ${e.message}</strong><br><br>
      1. Run <code>python extractor_beef.py --history US_Beef_Packer_Margin_Tracker_v4.xlsx</code><br>
      2. Commit <code>beef.db</code> to <code>Beef/U.S. Tracker/</code> no GitHub<br>
      3. Reload this page
    </div>`;
  }
}
init();
</script>
